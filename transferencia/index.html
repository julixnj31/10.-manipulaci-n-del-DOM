<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Tareas por Usuario</title>
    <!-- Aquí linkeo el CSS para que se vea bonito -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Gestión de Tareas por Usuario</h1>
    
    <!-- Sección para buscar usuario: Uso este form en JS para buscar sin recargar -->
    <section id="busqueda-usuario">
        <h2>Buscar Usuario</h2>
        <form id="form-usuario">
            <label for="user-id">Documento del Usuario:</label>
            <!-- Input donde pongo el ID del usuario -->
            <input type="number" id="user-id" required>
            <button type="submit">Buscar Usuario</button>
        </form>
        <!-- Aquí muestro la info del usuario si lo encuentro -->
        <div id="usuario-info" style="display: none;">
            <h3>Datos del Usuario</h3>
            <p><strong>ID:</strong> <span id="user-id-display"></span></p>
            <p><strong>Nombre:</strong> <span id="user-name"></span></p>
            <p><strong>Email:</strong> <span id="user-email"></span></p>
            <p><strong>Teléfono:</strong> <span id="user-phone"></span></p>
        </div>
        <!-- Si no encuentro al usuario, muestro este mensaje -->
        <div id="usuario-no-encontrado" style="display: none;">
            <p>Usuario no encontrado en el sistema.</p>
        </div>
    </section>
    
    <!-- Sección para registrar tareas: Solo aparece si encontré al usuario -->
    <section id="registro-tareas" style="display: none;">
        <h2>Registrar Tarea</h2>
        <form id="form-tarea">
            <label for="task-title">Título de la Tarea:</label>
            <!-- Campo para el título de la tarea -->
            <input type="text" id="task-title" required>
            
            <label for="task-description">Descripción:</label>
            <!-- Campo para la descripción -->
            <textarea id="task-description" required></textarea>
            
            <label for="task-status">Estado:</label>
            <!-- Select para elegir el estado -->
            <select id="task-status" required>
                <option value="">Seleccionar</option>
                <option value="pending">Pendiente</option>
                <option value="in-progress">En Progreso</option>
                <option value="completed">Completada</option>
            </select>
            
            <button type="submit">Registrar Tarea</button>
        </form>
    </section>
    
    <!-- Sección de la tabla: Aquí van apareciendo las tareas que agrego -->
    <section id="lista-tareas">
        <h2>Tareas Registradas</h2>
        <table id="tasks-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Descripción</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody>
                <!-- Tareas se agregarán aquí dinámicamente por app.js -->
            </tbody>
        </table>
    </section>
    
    <!-- Aquí linkeo el JS que hace todo lo interactivo -->
    <script src="app.js"></script>
</body>
</html>
